{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments — CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<div id="globalLoader" class="global-loader d-none">
    <div class="spinner"></div>
</div>
<div id="toastContainer" class="toast-container"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo-text">
            <span class="logo-dot"></span>
            <span>CRM</span>
        </div>
        <button class="toggle-btn" id="sidebarToggle">☰</button>
    </div>

    <nav>
        <div class="nav-section-label">Menu</div>
        <a href="/api/v1/dashboard-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/system-regular-10-analytics-hover-analytics.png' %}" width="18" height="18">
            </span>
            <span>Dashboard</span>
        </a>
        <a href="/api/v1/leads-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/lead-generation.png' %}" width="18" height="18">
            </span>
            <span>Leads</span>
        </a>
        <a href="/api/v1/appointments-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/calendar.png' %}" width="18" height="18">
            </span>
            <span>Appointments</span>
        </a>
        <a href="/api/v1/pipeline-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/scrum.png' %}" width="18" height="18">
            </span>
            <span>Pipeline</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="/api/v1/logout/" onclick="logout()" class="nav-link" style="color: var(--red);">
            <span class="nav-icon">
                <img
                    src="{% static 'icons/logout.png' %}"
                    width="18"
                    height="18"
                >
            </span>
            <span>Logout</span>
        </a>
    </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainContent">

    <div class="page-header">
        <div>
            <div class="page-title">Appointments</div>
            <div class="page-subtitle">Schedule and manage your appointments</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openModal()">+ New Appointment</button>
            <button class="theme-btn" id="themeToggle">🌙</button>
        </div>
    </div>

    <!-- TWO PANEL LAYOUT -->
    <div style="display:grid; grid-template-columns:1fr 300px; gap:16px; align-items:start;">

        <!-- CALENDAR -->
        <div class="card p-4">
            <div id="calendar"></div>
        </div>

        <!-- UPCOMING LIST -->
        <div class="card p-4">
            <div style="font-size:13px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;">Upcoming</div>
            <div id="appointmentsList">
                <div style="color:var(--text-3); font-size:13px;">Loading…</div>
            </div>
        </div>

    </div>

</main>

<!-- MODAL -->
<div class="modal fade" id="appointmentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">New Appointment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="appointmentId">

                <div class="mb-3">
                    <label class="form-label">Lead ID</label>
                    <input type="number" id="leadId" class="form-control" placeholder="Enter lead ID">
                </div>

                <div class="mb-3">
                    <label class="form-label">Date & Time</label>
                    <input type="datetime-local" id="dateTime" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select id="status" class="form-select">
                        <option value="scheduled">Scheduled</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="postponed">Postponed</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea id="notes" class="form-control" rows="3" placeholder="Optional notes…"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveAppointment()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
<script src="{% static 'js/appointments.js' %}"></script>

<script>

const themeBtn = document.getElementById("themeToggle");
const saved = localStorage.getItem("theme") || "light";
if (saved === "dark") { document.documentElement.setAttribute("data-theme", "dark"); themeBtn.textContent = "☀️"; }
themeBtn.addEventListener("click", () => {
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
    themeBtn.textContent = isDark ? "🌙" : "☀️";
    localStorage.setItem("theme", isDark ? "light" : "dark");
});
</script>

</body>
</html>
