{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Detail — CRMo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<div id="globalLoader" class="global-loader d-none">
    <div class="spinner"></div>
</div>
<div id="toastContainer" class="toast-container"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo-text">
            <span class="logo-dot"></span>
            <span>CRM</span>
        </div>
        <button class="toggle-btn" id="sidebarToggle">☰</button>
    </div>

    <nav>
        <div class="nav-section-label">Menu</div>
        <a href="/api/v1/dashboard-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/system-regular-10-analytics-hover-analytics.png' %}" width="18" height="18">
            </span>
            <span>Dashboard</span>
        </a>
        <a href="/api/v1/leads-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/lead-generation.png' %}" width="18" height="18">
            </span>
            <span>Leads</span>
        </a>
        <a href="/api/v1/appointments-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/calendar.png' %}" width="18" height="18">
            </span>
            <span>Appointments</span>
        </a>
        <a href="/api/v1/pipeline-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/scrum.png' %}" width="18" height="18">
            </span>
            <span>Pipeline</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="/api/v1/logout/" onclick="logout()" class="nav-link" style="color: var(--red);">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
        </a>
    </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainContent">

    <!-- HEADER -->
    <div class="page-header">
        <div style="display:flex; align-items:center; gap:14px;">
            <a href="/api/v1/leads-ui/" class="btn btn-ghost btn-sm">← Back</a>
            <div>
                <div class="page-title" id="leadName">Loading…</div>
                <div class="page-subtitle" id="leadCompany"></div>
            </div>
        </div>
        <div class="header-actions">
            <button class="theme-btn" id="themeToggle">🌙</button>
        </div>
    </div>

    <!-- DETAIL GRID -->
    <div class="detail-grid">

        <!-- LEFT COLUMN -->
        <div style="display:flex; flex-direction:column; gap:16px;">

            <!-- Contact Info -->
            <div class="card p-4">
                <div style="font-size:13px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;">Contact Info</div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="leadEmail">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value" id="leadPhone">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Company</span>
                    <span class="info-value" id="leadCompanyInfo">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Source</span>
                    <span class="info-value" id="leadSource">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Score</span>
                    <span class="info-value" id="leadScore">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Created</span>
                    <span class="info-value" id="leadCreated">—</span>
                </div>
            </div>

            <!-- Status -->
            <div class="card p-4">
                <div style="font-size:13px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;">Lead Status</div>
                <div style="margin-bottom:12px;">
                    <span id="leadStatusBadge" class="badge badge-new">—</span>
                </div>
                <select id="leadStatus" class="form-select" onchange="updateLeadStatus()">
                    <option value="new">🟢 New</option>
                    <option value="not received">🔴 Not Received</option>
                    <option value="busy">🟡 Busy</option>
                    <option value="in progress">🔵 In Progress</option>
                    <option value="qualified">🟣 Qualified</option>
                    <option value="proposal">🟠 Proposal Sent</option>
                    <option value="converted">✅ Converted</option>
                    <option value="lost">⚫ Lost</option>
                </select>
            </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div style="display:flex; flex-direction:column; gap:16px;">

            <!-- Appointments -->
            <div class="card p-4">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                    <div style="font-size:13px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em;">Appointments</div>
                    <button class="btn btn-primary btn-sm" onclick="openAppointmentModal()">+ Add</button>
                    
                </div>
                <div id="appointmentsList">
                    <div style="color:var(--text-3); font-size:13px; padding:12px 0;">No appointments yet.</div>
                    
                </div>
            </div>

            <!-- Activity Timeline -->
            <div class="card p-4">
                <div style="font-size:13px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;">Activity Timeline</div>
                <div class="timeline" id="activityTimeline">
                    <div style="color:var(--text-3); font-size:13px; padding:12px 0 12px 24px;">No activity yet.</div>
                </div>
            </div>

        </div>

    </div>

</main>

<!-- APPOINTMENT MODAL -->
<div class="modal fade" id="appointmentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Appointment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="appointmentId">

                <div class="mb-3">
                    <label class="form-label">Date & Time</label>
                    <input type="datetime-local" id="appointmentDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select id="appointmentStatus" class="form-select">
                        <option value="scheduled">Scheduled</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="postponed">Postponed</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea id="appointmentNotes" class="form-control" rows="3" placeholder="Optional notes…"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="saveBtn">Save Appointment</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
<script src="{% static 'js/lead_detail.js' %}"></script>

<script>

const themeBtn = document.getElementById("themeToggle");
const saved = localStorage.getItem("theme") || "light";
if (saved === "dark") { document.documentElement.setAttribute("data-theme", "dark"); themeBtn.textContent = "☀️"; }
themeBtn.addEventListener("click", () => {
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
    themeBtn.textContent = isDark ? "🌙" : "☀️";
    localStorage.setItem("theme", isDark ? "light" : "dark");
});

function openAppointmentModal() {
    document.getElementById("appointmentId").value = "";
    document.getElementById("appointmentDate").value = "";
    document.getElementById("appointmentNotes").value = "";
    document.getElementById("appointmentStatus").value = "scheduled";
    new bootstrap.Modal(document.getElementById("appointmentModal")).show();
}
</script>

</body>
</html>
