{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads — CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>


<div id="globalLoader" class="global-loader d-none">
    <div class="spinner"></div>
</div>
<div id="toastContainer" class="toast-container"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo-text">
            <span class="logo-dot"></span>
            <span class="logo-name">CRM</span>
        </div>
        <button class="toggle-btn" id="sidebarToggle">☰</button>
    </div>

    <nav>
        <div class="nav-section-label">Menu</div>
        <a href="/api/v1/dashboard-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/system-regular-10-analytics-hover-analytics.png' %}" width="18" height="18">
            </span>
            <span class="nav-label">Dashboard</span>
        </a>
        <a href="/api/v1/leads-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/lead-generation.png' %}" width="18" height="18">
            </span>
            <span class="nav-label">Leads</span>
        </a>
        <a href="/api/v1/appointments-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/calendar.png' %}" width="18" height="18">
            </span>
            <span class="nav-label">Appointments</span>
        </a>
        <a href="/api/v1/pipeline-ui/" class="nav-link">
            <span class="nav-icon">
                <img src="{% static 'icons/scrum.png' %}" width="18" height="18">
            </span>
            <span class="nav-label">Pipeline</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="/api/v1/logout/" onclick="logout()" class="nav-link" style="color: var(--red);">
            <span class="nav-icon">
                <img
                    src="{% static 'icons/logout.png' %}"
                    width="18"
                    height="18"
                >
            </span>
            <span class="nav-label">Logout</span>
        </a>
    </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainContent">

    <div class="header-actions">
        <div>
            <div class="page-title">Leads</div>
            <div class="page-subtitle">Manage and track all your leads</div>
        </div>
        <div class="dropdown">
            <button class="btn btn-primary btn-sm dropdown-toggle" 
                 data-bs-toggle="dropdown">Export
            </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" onclick="exportCSV()">Export CSV</a></li>
                    <li><a class="dropdown-item" onclick="exportExcel()">Export Excel</a></li>
                </ul>
        </div>

            <!-- Add Lead -->
            <button class="btn btn-ghost btn-sm" 
                    data-bs-toggle="modal" 
                    data-bs-target="#addLeadModal">+ Add Lead</button>

            <!-- Import CSV (hidden input + button) -->
            <input type="file" id="importFile" accept=".csv" style="display:none">
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">
                Import CSV
            </button>

            <!-- Theme toggle -->
            <button class="theme-btn" id="themeToggle">🌙</button>

        </div>

        <div class="modal fade" id="addLeadModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Add Lead +</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" id="first_name" class="form-control">
                        </div>
                         <div class="mb-3">
                            <label class="form-label">last Name</label>
                            <input type="text" id="last_name" class="form-control">
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="text" id="email" class="form-control">
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" id="phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Source</label>
                            <select name="source" id="leadSource" class="form-control"> 
                                <option value="">All Source</option>                            
                                <option value="manual">Manual</option>
                                <option value="meta ads">Meta Ads</option>
                                <option value="website">Website</option>
                                <option value="google ads">Google Ads</option>
                                <option value="referral">Referral</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" id="leadStatus" class="form-control">
                                <option value="">All Status</option> 
                                <option value="new">New</option>
                                <option value="converted">Converted</option>
                                <option value="in progress">In-progreee</option>
                                <option value="proposal">Proposal sent</option>
                                <option value="spam">Spam</option>
                                <option value="lost">Lost</option>
                            </select>                           

                        </div>
                                               

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary btn-sm" onclick="saveLead()">Save Lead</button>
                    </div>

                </div>
            </div>
        </div>

    <!-- FILTERS -->
    <div class="card p-3 mb-4">
        <div class="filter-row">
            <div class="search-bar" style="flex:1; min-width:200px; max-width:300px;">
                <input type="text" id="filterSearch" class="form-control" placeholder="Search name, phone, email…">
            </div>

            <select id="filterStatus" class="form-select filter-box">
                <option value="">All Status</option>
                <option value="new">New</option>
                <option value="not received">Not Received</option>
                <option value="busy">Busy</option>
                <option value="in progress">In Progress</option>
                <option value="qualified">Qualified</option>
                <option value="proposal">Proposal</option>
                <option value="converted">Converted</option>
                <option value="lost">Lost</option>
            </select>

            <select id="filterSource" class="form-select filter-box">
                <option value="">All Sources</option>
                <option value="meta ads">Meta Ads</option>
                <option value="google ads">Google Ads</option>
                <option value="manual">Manual</option>
                <option value="website">Website</option>
                <option value="referral">Referral</option>
            </select>
            <button class="btn btn-primary" onclick="loadLeads()">
                Apply Filters
            </button>
            <button class="btn btn-ghost" onclick="clearFilters()">
                Clear
            </button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;"><input type="checkbox" id="selectAll"></th>
                        <th>Lead</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Source</th>
                        <th>Next Follow-up</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leadsTable">
                    <tr>
                        <td><input type="checkbox" class="leadCheckbox" value="${lead.id}"></td>
                        <td colspan="7" style="text-align:center; padding:40px; color:var(--text-3);">
                            Loading leads…

                        </td>
                    </tr>
                </tbody>

            </table>
            
        </div>
        
    </div>
    <div class="mt-3">
        <button class="btn btn-danger btn-sm" onclick="bulkDelete()" >
            Delete Selected
        </button>
    </div>

</main>

<script src="{% static 'js/main.js' %}"></script>
<script src="{% static 'js/leads.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>

const themeBtn = document.getElementById("themeToggle");
const saved = localStorage.getItem("theme") || "light";
if (saved === "dark") { document.documentElement.setAttribute("data-theme", "dark"); themeBtn.textContent = "☀️"; }
themeBtn.addEventListener("click", () => {
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
    themeBtn.textContent = isDark ? "🌙" : "☀️";
    localStorage.setItem("theme", isDark ? "light" : "dark");
});






function clearFilters() {
    document.getElementById("filterSearch").value = "";
    document.getElementById("filterStatus").value = "";
    document.getElementById("filterSource").value = "";
    loadLeads();
}

// Make rows clickable — navigate to lead detail
function goToLead(id) {
    window.location.href = `/api/v1/lead/${id}/`;
}
</script>

</body>
</html>
